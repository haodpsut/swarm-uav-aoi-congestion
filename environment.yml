name: swarm-uav-aoi
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy            # Wilcoxon signed-rank test in joint_solver.py
  - matplotlib
  - pip
  - pip:
      # On the Linux GPU server, the default torch wheel is the CUDA build, so
      # the CETSP trajectory optimiser (src/trajectory.py) runs on the RTX 4090
      # automatically (it falls back to CPU if CUDA is absent).
      - torch

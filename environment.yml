name: swarm-uav-aoi
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy            # Wilcoxon signed-rank test in joint_solver.py
  - matplotlib
  - pip
  - pip:
      # RTX 4090 server driver supports up to CUDA 12.5, so pin the cu124 torch
      # build (the default/latest wheel targets a newer CUDA and fails with
      # "NVIDIA driver too old"). cu124 runs on driver 12.5. Falls back to CPU if
      # CUDA is unavailable. If cu124 still errors, use cu121.
      - --index-url https://download.pytorch.org/whl/cu124
      - --extra-index-url https://pypi.org/simple
      - torch
